<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Geist:wght@100..900&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <header>
        <nav>
            <div class="navbar bg-base-100 shadow-sm px-10">
                <div class="flex justify-between w-full">
                    <div class="flex items-center">
                        <img src="assets/github-logo.png" alt="Github Logo" class="w-8 h-8 mr-2" />
                        <h1>GitHub Issues Tracker</h1>
                    </div>
                    <div class="">
                        <input id="search" type="text" placeholder="Search"
                            class="input input-bordered w-24 md:w-auto" />
                        <button class="btn btn-primary ml-3" onclick="searchIssues()">Search</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main class="w-11/12 mx-auto py-8 ">
        <section class="bg-white p-6 rounded-lg shadows mb-6">
            <button id="btn-all" onclick="setActiveButton('btn-all'); loadHomepage()"
                class="btn btn-primary w-30">All</button>
            <button id="btn-open" onclick="setActiveButton('btn-open'); loadOpenIssues()"
                class="btn btn-outline btn-primary w-30">Open</button>
            <button id="btn-closed" onclick="setActiveButton('btn-closed'); loadClosedIssues()"
                class="btn btn-outline btn-primary w-30">Closed</button>
        </section>
        <section id="issue-container" class="bg-white p-6 rounded-t-lg shadows mb-1">

        </section>
        <section id="loder" class="flex justify-center items-center mt-20 hidden">
            <span class="loading loading-spinner loading-xl"></span>
        </section>
        <section class="bg-white p-6  shadows mb-6">
            <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">

            </div>

        </section>
    </main>

    <!-- Issue Detail Modal -->
    <dialog id="my_modal_1" class="modal">
        <div class="modal-box w-11/12 max-w-2xl">
            <div id="modal-content">
                <!-- populated by modal.js -->
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>



    <script src="script/allSection.js"></script>
    <script src="script/openSection.js"></script>
    <script src="script/closeSection.js"></script>
    <script src="script/search.js"></script>
    <script src="script/modal.js"></script>

</body>

</html>
