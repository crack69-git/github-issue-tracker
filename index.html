<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Geist:wght@100..900&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <main>
        <section class="">
            <div class="bg-white shadow-md w-11/12 md:w-1/3 mx-auto px-4 mt-20 rounded-lg">
                <div>
                    <img src="assets/github-logo.png" alt="Github Logo" class="w-16 mx-auto mt-4" />
                    <div class="text-center my-6">
                        <h2 class="text-2xl font-semibold ">GitHub Issues Tracker</h2>
                        <p class="text-[#64748B]">Sign in to manage your issues</p>
                    </div>
                </div>
                <fieldset class="fieldset">
                    <label class="label text-base">Username</label>
                    <input type="text" class="input w-full" placeholder="Enter Username" />
                    <p class="text-primary">Default: admin</p>

                    <label class="label text-base">Password</label>
                    <input type="password" class="input w-full" placeholder="Enter Password" />
                    <p class="text-primary">Default: admin123</p>
                    <button class="btn btn-neutral mt-4">Sign In</button>
                </fieldset>
                <div class="divider">OR</div>
                <div class="pb-7">
                    <p class="text-center text-[#64748B] text-sm">Demo Credentials:</p>
                    <div class="bg-[#F8FAFC] text-center py-6 rounded-lg">
                        <p><span class="font-semibold">Username:</span> admin</p>
                        <p><span class="font-semibold">Password:</span> admin123</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="script/signup.js"></script>
</body>

</html>
